var sortCol='n', sortDir=1, filterMode='all';

function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function hl(text, q){
  if(!q) return text;
  var nt=norm(text), nq=norm(q);
  var i=nt.indexOf(nq);
  if(i<0) return text;
  return text.slice(0,i)+'<mark>'+text.slice(i,i+q.length)+'</mark>'+text.slice(i+q.length);
}

function render(){
  try {
    var raw = document.getElementById('search').value.trim();
    var q = norm(raw);
    var rows = data.filter(function(r){
      if(filterMode==='skladem' && r.m<=0) return false;
      if(filterMode==='zero' && r.m>0) return false;
      if(!q) return true;
      return norm(r.n).indexOf(q)>=0 || norm(r.k).indexOf(q)>=0;
    });
    rows.sort(function(a,b){
      var av = sortCol==='m' ? a.m : (sortCol==='k' ? a.k : a.n);
      var bv = sortCol==='m' ? b.m : (sortCol==='k' ? b.k : b.n);
      if(typeof av==='number') return (av-bv)*sortDir;
      return String(av||'').localeCompare(String(bv||''),'cs')*sortDir;
    });
    document.getElementById('stats').textContent = rows.length + ' / ' + data.length + ' položek';
    var html = '';
    for(var i=0; i<rows.length; i++){
      var r = rows[i];
      html += '<tr>';
      html += '<td>'+hl(r.k, raw)+'</td>';
      html += '<td>'+hl(r.n||'—', raw)+'</td>';
      html += '</tr>';
    }
    document.getElementById('tbody').innerHTML = html;
  } catch(e) {
    document.getElementById('stats').textContent = 'Chyba zobrazení: ' + e.message;
  }
}

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('search').addEventListener('input', render);
  var btns = document.querySelectorAll('.filter-btn');
  for(var i=0; i<btns.length; i++){
    btns[i].addEventListener('click', function(){
      for(var j=0; j<btns.length; j++) btns[j].classList.remove('active');
      this.classList.add('active');
      filterMode = this.getAttribute('data-filter');
      render();
    });
  }
  var ths = document.querySelectorAll('thead th[data-col]');
  for(var i=0; i<ths.length; i++){
    ths[i].addEventListener('click', function(){
      var col = this.getAttribute('data-col');
      if(sortCol===col) sortDir*=-1; else {sortCol=col; sortDir=1;}
      render();
    });
  }
  render();
});
</script>
